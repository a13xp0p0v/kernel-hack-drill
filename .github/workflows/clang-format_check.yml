name: C style analysis

permissions:
  contents: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  clang-format_test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format git
    - name: Verify .clang-format exists
      run: |
        if [ ! -f ".clang-format" ]; then
          echo -e "\033[33mWarning: .clang-format file not found in project root\033[0m"
          echo "Create it or use the default style"
          exit 1
        fi
    - name: Apply clang-format
      run: |
        find . -type f \( -name "*.c" -o -name "*.h" \) -exec clang-format -i {} \;
    - name: Generate diff
      run: |
        git diff > style.patch
    - name: Check for style violations
      run: |
        if [ -s style.patch ]; then
          echo -e "\n\033[31mError:\033[0m Code style violations detected. Apply changes by running:"
          echo -e "\033[34mgit apply style.patch\033[0m"
          exit 1
        fi
    - name: Upload style.patch on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: style.patch
        path: style.patch
        retention-days: 7
